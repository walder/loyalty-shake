<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shake PoC</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111;
      color: #fff;
      transition: background 0.4s ease;
      user-select: none;
    }

    #status-text {
      display: none;
      font-size: clamp(2.5rem, 12vw, 5rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      text-align: center;
      transition: color 0.3s ease;
      line-height: 1.1;
    }

    /* Start button (iOS permission) */
    #start-btn {
      margin-top: 3rem;
      padding: 1rem 2.5rem;
      font-size: 1.2rem;
      font-weight: 700;
      border: none;
      border-radius: 999px;
      background: #fff;
      color: #111;
      cursor: pointer;
      transition: opacity 0.3s ease, transform 0.15s ease;
    }
    #start-btn:active { transform: scale(0.96); }
    #start-btn.hidden { display: none; }

    #restart-btn {
      margin-top: 2rem;
      padding: 0.9rem 2.5rem;
      font-size: 1.1rem;
      font-weight: 700;
      border: none;
      border-radius: 999px;
      background: #fff;
      color: #111;
      cursor: pointer;
      transition: opacity 0.3s ease, transform 0.15s ease;
    }
    #restart-btn:active { transform: scale(0.96); }
    #restart-btn.hidden { display: none; }

    /* Debug bar */
    #debug {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      color: #555;
      text-align: center;
      pointer-events: none;
      font-variant-numeric: tabular-nums;
    }

    /* State colour tokens */
    body.state-idle    { --accent: #e53935; }
    body.state-shaking { --accent: #fb8c00; }
    body.state-shake-harder { --accent: #e53935; }
    body.state-opened  { --accent: #43a047; }
  </style>
</head>
<body class="state-idle">

  <div id="status-text">Shake It</div>

  <button id="start-btn">Start</button>
  <button id="restart-btn" class="hidden">Nochmal</button>

  <div id="debug">accel: — &nbsp;|&nbsp; state: idle</div>

<script>
(function () {
  'use strict';

  // ── Constants ──────────────────────────────────────────────
  const DETECT_THRESHOLD  = 2.5; // m/s² — any intentional shake
  const HARD_THRESHOLD    = 5;   // m/s² — solid deliberate shake
  const OPEN_DURATION_MS  = 1500; // ms of hard shaking needed
  const SOFT_DELAY_MS     = 1000; // ms before showing "Shake Harder"
  const SAMPLE_WINDOW     = 3;    // samples to average (smaller = more peak-sensitive)
  const VIBRATE_MUTEX_MS  = 200; // ms minimum between any two vibrate starts

  // ── Vibration ──────────────────────────────────────────────
  const CAN_VIBRATE = 'vibrate' in navigator;
  let lastVibrateMs = 0;

  function vibrate(pattern) {
    if (!CAN_VIBRATE) return;
    if (pattern === 0) { navigator.vibrate(0); return; } // stop always goes through
    const now = performance.now();
    if (now - lastVibrateMs < VIBRATE_MUTEX_MS) return;
    lastVibrateMs = now;
    navigator.vibrate(pattern);
  }

  function vibrateShakeTick(mag) {
    // Scale pulse: 80ms at DETECT_THRESHOLD → 200ms at HARD_THRESHOLD
    const t = Math.max(0, Math.min(1,
      (mag - DETECT_THRESHOLD) / (HARD_THRESHOLD - DETECT_THRESHOLD)));
    vibrate([Math.round(80 + t * 120)]);
  }

  // ── Audio ───────────────────────────────────────────────────
  let audioCtx    = null;
  let gainNode    = null;
  let shakeBuffer = null;   // trimmed 4-second AudioBuffer
  let shakeSource = null;   // currently playing AudioBufferSourceNode

  function initAudio() {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      gainNode = audioCtx.createGain();
      gainNode.gain.value = 0;
      gainNode.connect(audioCtx.destination);
    } catch (e) { return; }

    fetch('sample-sound.mp3')
      .then(r => r.arrayBuffer())
      .then(ab => audioCtx.decodeAudioData(ab))
      .then(full => {
        const frames = Math.min(Math.floor(4 * full.sampleRate), full.length);
        const buf = audioCtx.createBuffer(full.numberOfChannels, frames, full.sampleRate);
        for (let ch = 0; ch < full.numberOfChannels; ch++) {
          buf.getChannelData(ch).set(full.getChannelData(ch).subarray(0, frames));
        }
        shakeBuffer = buf;
      })
      .catch(() => {}); // silent failure — audio just won't play
  }

  function startShakeSound() {
    if (!audioCtx || !shakeBuffer) return;
    const doStart = () => {
      gainNode.gain.cancelScheduledValues(audioCtx.currentTime);
      if (shakeSource) {
        // Source läuft bereits – nur Gain hochfahren
        gainNode.gain.setTargetAtTime(0.6, audioCtx.currentTime, 0.05);
        return;
      }
      shakeSource = audioCtx.createBufferSource();
      shakeSource.buffer = shakeBuffer;
      shakeSource.loop = true;
      shakeSource.connect(gainNode);
      shakeSource.start();
      gainNode.gain.setTargetAtTime(0.6, audioCtx.currentTime, 0.05);
    };
    if (audioCtx.state !== 'running') {
      audioCtx.resume().then(doStart);
    } else {
      doStart();
    }
  }

  // hard=false: Gain auf 0 fahren, Source weiterlaufen lassen (Idle-Übergang)
  // hard=true:  Source tatsächlich stoppen (Opened-Zustand)
  function stopShakeSound(hard = false) {
    if (!shakeSource) return;
    gainNode.gain.cancelScheduledValues(audioCtx.currentTime);
    gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, hard ? 0.1 : 0.05);
    if (hard) {
      const src = shakeSource;
      shakeSource = null;
      setTimeout(() => { try { src.stop(); } catch (e) {} }, 400);
    }
  }

  function setShakeVolume(mag) {
    if (!gainNode || !shakeSource) return;
    const t = Math.max(0, Math.min(1,
      (mag - DETECT_THRESHOLD) / (HARD_THRESHOLD - DETECT_THRESHOLD)));
    gainNode.gain.cancelScheduledValues(audioCtx.currentTime);
    gainNode.gain.setTargetAtTime(0.3 + t * 0.7, audioCtx.currentTime, 0.08);
    shakeSource.playbackRate.setTargetAtTime(0.95 + t * 0.1, audioCtx.currentTime, 0.15);
  }

  // ── State ──────────────────────────────────────────────────
  let state = 'idle';
  let locked = false;            // once opened, no more transitions

  let softShakingSince = null;   // timestamp when soft shaking began
  let hardShakingSince = null;   // timestamp when hard shaking began

  const samples = [];            // rolling window of magnitude values

  // ── DOM refs ───────────────────────────────────────────────
  const bodyEl       = document.body;
  const statusEl     = document.getElementById('status-text');
  const startBtn     = document.getElementById('start-btn');
  const restartBtn   = document.getElementById('restart-btn');
  const debugEl      = document.getElementById('debug');


  // ── UI helpers ─────────────────────────────────────────────
  const STATE_CONFIG = {
    idle:         { label: 'Shake It',     cls: 'state-idle',         color: '#e53935' },
    shaking:      { label: 'Shaking',      cls: 'state-shaking',      color: '#fb8c00' },
    shake_harder: { label: 'Shake Harder', cls: 'state-shake-harder', color: '#e53935' },
    opened:       { label: 'Opened!',      cls: 'state-opened',       color: '#43a047' },
  };

  function applyState(newState) {
    if (state === newState) return;
    state = newState;
    switch (newState) {
      case 'shaking':      vibrate([30]);                    break;
      case 'shake_harder': vibrate([50, 80, 50]);            break;
      case 'opened':       vibrate([100, 50, 100, 50, 200]); break;
      case 'idle':         vibrate(0);                       break;
    }
    switch (newState) {
      case 'shaking':      startShakeSound();  break;
      case 'shake_harder': /* sound keeps playing */ break;
      case 'opened':       stopShakeSound(true);  break;
      case 'idle':         stopShakeSound(false); break;
    }
    restartBtn.classList.toggle('hidden', newState !== 'opened');
    const cfg = STATE_CONFIG[newState];
    statusEl.textContent = cfg.label;
    statusEl.style.color = cfg.color;
    bodyEl.className = cfg.cls;
  }

  function resetGame() {
    locked = false;
    softShakingSince = null;
    hardShakingSince = null;
    samples.length = 0;
    state = 'opened'; // force applyState to not skip
    applyState('idle');
  }

  // ── Motion processing ──────────────────────────────────────
  // Low-pass gravity estimate for the accelerationIncludingGravity fallback.
  // ALPHA=0.9 at ~60Hz gives ~1.5Hz cutoff — tracks gravity, not shaking.
  let gravX = 0, gravY = 0, gravZ = 9.81;
  const GRAV_ALPHA = 0.9;

  function getMagnitude(event) {
    let ax, ay, az;

    if (event.acceleration &&
        event.acceleration.x != null) {
      ax = event.acceleration.x;
      ay = event.acceleration.y;
      az = event.acceleration.z;
    } else if (event.accelerationIncludingGravity &&
               event.accelerationIncludingGravity.x != null) {
      // High-pass filter: remove running gravity estimate from all axes
      const rx = event.accelerationIncludingGravity.x;
      const ry = event.accelerationIncludingGravity.y;
      const rz = event.accelerationIncludingGravity.z;
      gravX = GRAV_ALPHA * gravX + (1 - GRAV_ALPHA) * rx;
      gravY = GRAV_ALPHA * gravY + (1 - GRAV_ALPHA) * ry;
      gravZ = GRAV_ALPHA * gravZ + (1 - GRAV_ALPHA) * rz;
      ax = rx - gravX;
      ay = ry - gravY;
      az = rz - gravZ;
    } else {
      return 0;
    }

    return Math.sqrt(ax * ax + ay * ay + az * az);
  }

  function smoothedMagnitude(raw) {
    samples.push(raw);
    if (samples.length > SAMPLE_WINDOW) samples.shift();
    return samples.reduce((s, v) => s + v, 0) / samples.length;
  }

  function onDeviceMotion(event) {
    if (locked) return;

    const raw  = getMagnitude(event);
    const mag  = smoothedMagnitude(raw);
    const now  = performance.now();

    debugEl.textContent = `raw:${raw.toFixed(1)} avg:${mag.toFixed(1)} m/s² | ${state} | vib:${CAN_VIBRATE ? '✓' : '✗'}`;

    if (mag >= HARD_THRESHOLD) {
      // Hard shaking ─────────────────────────────────────────
      softShakingSince = null;
      if (hardShakingSince === null) hardShakingSince = now;

      const elapsed = now - hardShakingSince;
      const fraction = elapsed / OPEN_DURATION_MS;


      setShakeVolume(mag);

      vibrateShakeTick(mag);

      if (state !== 'shaking' && state !== 'opened') applyState('shaking');
      else if (state !== 'opened') {
        // keep label as "Shaking" while ring fills
        if (statusEl.textContent !== 'Shaking') statusEl.textContent = 'Shaking';
        statusEl.style.color = STATE_CONFIG.shaking.color;
        bodyEl.className = STATE_CONFIG.shaking.cls;
        state = 'shaking';
      }

      if (elapsed >= OPEN_DURATION_MS) {
        applyState('opened');
        locked = true;

      }

    } else if (mag >= DETECT_THRESHOLD) {
      // Soft shaking ─────────────────────────────────────────
      hardShakingSince = null;


      setShakeVolume(mag);
      vibrateShakeTick(mag);

      if (softShakingSince === null) softShakingSince = now;
      const softElapsed = now - softShakingSince;

      if (state === 'idle') {
        applyState('shaking');
      } else if (softElapsed >= SOFT_DELAY_MS && state !== 'shake_harder') {
        applyState('shake_harder');
      }

    } else {
      // Below detect threshold ────────────────────────────────
      hardShakingSince = null;
      softShakingSince = null;
      vibrate(0);


      if (state !== 'idle') applyState('idle');
    }
  }

  // ── Permission / setup ─────────────────────────────────────
  function startListening() {
    initAudio();
    if (audioCtx) {
      // iOS requires playing a sound (even silent) inside a user gesture to unlock audio
      const silence = audioCtx.createBuffer(1, 1, audioCtx.sampleRate);
      const silenceSource = audioCtx.createBufferSource();
      silenceSource.buffer = silence;
      silenceSource.connect(audioCtx.destination);
      silenceSource.start();
      audioCtx.resume();
    }
    document.addEventListener('touchstart', () => { if (audioCtx) audioCtx.resume(); }, { once: true });
    window.addEventListener('devicemotion', onDeviceMotion);
    startBtn.classList.add('hidden');
    statusEl.style.display = 'block';
  }

  function requestPermission() {
    if (typeof DeviceMotionEvent !== 'undefined' &&
        typeof DeviceMotionEvent.requestPermission === 'function') {
      DeviceMotionEvent.requestPermission()
        .then(function (result) {
          if (result === 'granted') {
            startListening();
          } else {
            statusEl.textContent = 'Permission denied';
          }
        })
        .catch(function (err) {
          statusEl.textContent = 'Error: ' + err.message;
        });
    } else {
      // Non-iOS: permission not needed
      startListening();
    }
  }

  startBtn.addEventListener('click', requestPermission);
  restartBtn.addEventListener('click', resetGame);


})();
</script>
</body>
</html>
